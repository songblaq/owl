# homelab endpoint config — 실제 값은 ~/.config/omb/endpoints.conf 에 저장.
# 이 example 파일은 repo 에 올라가는 placeholder 이며 실제 IP/호스트 노출 금지.
#
# 사용 절차:
#   mkdir -p ~/.config/omb
#   cp tools/endpoints.example.conf ~/.config/omb/endpoints.conf
#   # 실제 IP 로 편집 후 chmod 600
#   chmod 600 ~/.config/omb/endpoints.conf
#
# 스크립트는 $OMB_ENDPOINTS_CONF (또는 ~/.config/omb/endpoints.conf) 를 source 함.
# 없으면 placeholder 로 동작 → probe 는 DOWN 으로 기록됨 (기대 동작).

# --- LLM backends ---------------------------------------------------------
# dgx primary (openai 호환) / backup
DGX_PRIMARY_URL="${DGX_PRIMARY_URL:-http://dgx.local:8000}"
DGX_PRIMARY_MODEL="${DGX_PRIMARY_MODEL:-primary-model}"
DGX_BACKUP_URL="${DGX_BACKUP_URL:-http://dgx.local:8001}"
DGX_BACKUP_MODEL="${DGX_BACKUP_MODEL:-backup-model}"

# mac-studio ollama
MAC_STUDIO_OLLAMA_URL="${MAC_STUDIO_OLLAMA_URL:-http://mac-studio.local:11434}"
MAC_STUDIO_MODEL="${MAC_STUDIO_MODEL:-placeholder:latest}"

# NAS
NAS_URL="${NAS_URL:-http://nas.local}"

# 5090 WSL ollama
WSL_5090_URL="${WSL_5090_URL:-http://wsl-5090.local:11434}"
